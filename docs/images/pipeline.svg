  <text x="280" y="106" text-anchor="middle" font-size="10" fill="#ffc8c4">live reload on save</text>

  <!-- Arrow 2 -->
  <line x1="363" y1="65" x2="397" y2="65" stroke="#a81d2d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 3: Browser (schematic) -->
  <rect x="400" y="15" width="150" height="100" rx="8" fill="#fff7f6" stroke="#e8c7c0" stroke-width="1.5"/>
