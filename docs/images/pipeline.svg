  <text x="30" y="80" font-size="11" fill="#7c3a3f">guide/</text>
  <text x="30" y="96" font-size="11" fill="#7c3a3f">reference/</text>
  <text x="30" y="109" font-size="10" fill="#b07070">images/  public/</text>

  <!-- Arrow 1 -->
  <line x1="163" y1="65" x2="197" y2="65" stroke="#a81d2d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 2: adocserver -->
  <rect x="200" y="15" width="160" height="100" rx="8" fill="#a81d2d"/>
