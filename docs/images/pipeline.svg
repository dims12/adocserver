<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 130" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a81d2d"/>
    </marker>
  </defs>

  <!-- Box 1: Source Files -->
  <rect x="10" y="15" width="150" height="100" rx="8" fill="#fff7f6" stroke="#e8c7c0" stroke-width="1.5"/>
  <rect x="10" y="15" width="150" height="30" rx="8" fill="#e8c7c0"/>
  <rect x="10" y="37" width="150" height="8" fill="#e8c7c0"/>
